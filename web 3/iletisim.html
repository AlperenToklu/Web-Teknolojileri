    <script type="text/javascript">
    
        $(function () {
            
            $('#email').blur(function () {
                var $result = $("#result");
                var email = $("#email").val();
                $result.text("");

                if (validateEmail(email)) {
                    $("#email").css('background-color', 'green');
                    if (document.getElementById('email').style.backgroundColor == "green" && document.getElementById('Number').style.backgroundColor == "green" && document.getElementById('mssgme').style.backgroundColor == "green") {
                        document.getElementById("login").disabled = false;
                    }

                } else {
                    $("#email").css('background-color', 'red');
                    document.getElementById("login").disabled = true;
                }
                return false;

            });
        });
    </script>

    <script>

    function validateEmail(email) {
        var re = /^(([^<>()[\]\\.,;:\s@\"]+(\.[^<>()[\]\\.,;:\s@\"]+)*)|(\".+\"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;
                return re.test(email);
            }
    </script>
