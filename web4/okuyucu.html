<!DOCTYPE html>
<html>
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
</head>
<body>

    <div>
        <p> Gönderen: </p>
        <p id="bir"> </p>

    </div>

    <br /> <br />
    <div>
        <p> Telefon </p>
        <p id="iki">  </p>

    </div>
    <br /> <br />
    <div>
        <p> Email </p>
        <p id="uc"></p>

    </div>
    <br /> <br />
    <div>
        <p> Gönderdiğiniz mesaj: </p>
        <p id="write">  </p>

    </div>

</body>
</html>

<script>
    function processForm() {
        var parameters = location.search.substring(1).split("&");
        var bir = parameters[0].split("=");
        var iki = parameters[1].split("=");
        var uc = parameters[2].split("=");
        var temp = parameters[3].split("=");

        l = unescape(temp[1]);
        l1 = unescape(bir[1]);
        l2 = unescape(iki[1]);
        l3 = unescape(uc[1]);

        document.getElementById("bir").innerHTML = l1;
        document.getElementById("iki").innerHTML = l2;
        document.getElementById("uc").innerHTML = l3;
        document.getElementById("write").innerHTML = l;
    }
    processForm();
</script>
